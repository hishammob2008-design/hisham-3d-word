<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Card - Hisham</title>
    <style>
        /* تنسيقات الصفحة الأساسية */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #151515; /* لون خلفية غامق */
            font-family: sans-serif;
        }

        /* حاوية البطاقة */
        .card {
            width: 300px;
            height: 400px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            perspective: 2500px;
            cursor: pointer;
        }

        /* غلاف الصورة الخلفية */
        .wrapper {
            transition: all 0.5s;
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .cover-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
        }

        /* تأثير الحركة عند لمس البطاقة */
        .card:hover .wrapper {
            transform: rotateX(25deg) translateY(-5%) translateZ(0);
            box-shadow: 2px 35px 32px -8px rgba(0, 0, 0, 0.75);
        }

        /* تنسيق الشخصية التي ستظهر للخارج */
        .character {
            width: 100%;
            opacity: 0;
            transition: all 0.5s;
            position: absolute;
            z-index: 1;
            pointer-events: none;
        }

        /* ظهور الشخصية وتأثير الـ 3D عند اللمس */
        .card:hover .character {
            opacity: 1;
            transform: translate3d(0%, -30%, 100px);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="wrapper">
            <img src="bg.jpg" class="cover-image">
        </div>
        <img src="char.png" class="character">
    </div>

</body>
</html>
