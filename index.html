<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Card - Hisham</title>
    <style>
        body { 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #050a0f; 
            overflow: hidden; 
        }

        .card { 
            width: 220px; 
            height: 320px; 
            position: relative; 
            perspective: 1000px; 
            cursor: pointer; 
        }

        .wrapper { 
            width: 100%; 
            height: 100%; 
            transition: all 0.5s; 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid rgba(0, 255, 255, 0.3); 
        }

        .card:hover .wrapper { 
            transform: rotateX(20deg) scale(1.05); 
            box-shadow: 0 20px 50px rgba(0,255,255,0.2); 
        }

        .bg-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        .char-img { 
            position: absolute; 
            width: 130%; 
            bottom: 0; 
            left: -15%; 
            opacity: 0; 
            transition: all 0.5s; 
            z-index: 10; 
            pointer-events: none; 
        }

        .card:hover .char-img { 
            opacity: 1; 
            transform: translate3d(0, -20%, 50px); 
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="wrapper">
            <img src="1777405282756.png" class="bg-img">
        </div>
        <img src="1777405275624.png" class="char-img">
    </div>

</body>
</html>
